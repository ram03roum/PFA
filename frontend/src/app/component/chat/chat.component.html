<div class="chat-container">
  <!-- Sidebar - Conversations -->
  <div class="chat-sidebar">
    <button class="btn-new-chat" (click)="showNewConvForm = !showNewConvForm">
      ➕ Nouvelle conversation
    </button>

    <!-- Formulaire nouvelle conversation -->
    <div *ngIf="showNewConvForm" class="new-conv-form">
      <input
        type="text"
        placeholder="Titre de la conversation..."
        [(ngModel)]="newConvTitle"
        class="input-field"
      />
      <select [(ngModel)]="newConvTopic" class="select-field">
        <option value="general">Général</option>
        <option value="reservation">Réservation</option>
        <option value="billing">Facturation</option>
        <option value="support">Support</option>
      </select>
      <button (click)="createNewConversation()" class="btn-primary">Créer</button>
      <button (click)="showNewConvForm = false" class="btn-secondary">Annuler</button>
    </div>

    <!-- Liste des conversations -->
    <div class="conversations-list">
      <div
        *ngFor="let conv of conversations"
        [class.active]="currentConversation?.id === conv.id"
        class="conversation-item"
        (click)="selectConversation(conv)"
      >
        <div class="conv-title">{{ conv.title }}</div>
        <div class="conv-meta">💬 {{ conv.message_count }} • {{ conv.created_at }}</div>
        <div class="conv-topic">{{ conv.topic }}</div>
      </div>

      <div *ngIf="conversations.length === 0" class="empty-message">Aucune conversation</div>
    </div>
  </div>

  <!-- Chat Area -->
  <div class="chat-area">
    <div *ngIf="!currentConversation" class="empty-state">
      <div class="empty-icon">💬</div>
      <p>Sélectionnez une conversation ou créez-en une nouvelle</p>
    </div>

    <div *ngIf="currentConversation" class="chat-content">
      <!-- Header -->
      <div class="chat-header">
        <div class="header-info">
          <h3>{{ currentConversation.title }}</h3>
          <span class="topic-badge">{{ currentConversation.topic }}</span>
        </div>
        <div class="chat-actions">
          <button (click)="getSummary()" class="btn-icon" title="Générer un résumé">📋</button>
          <button (click)="closeConversation()" class="btn-icon" title="Fermer">✕</button>
        </div>
      </div>

      <!-- Messages -->
      <div #messagesContainer class="messages-area">
        <div *ngIf="messages.length === 0" class="no-messages">Commencez la conversation...</div>

        <div
          *ngFor="let msg of messages"
          [ngClass]="getSenderClass(msg.sender_type)"
          class="message-wrapper"
        >
          <div class="message">
            <div class="message-content" [innerHTML]="msg.content | safeHtml"></div>
            <div class="message-time">{{ msg.created_at }}</div>
          </div>
        </div>
      </div>

      <!-- Input -->
      <div class="chat-input-area">
        <input
          type="text"
          placeholder="Tapez votre message..."
          [(ngModel)]="newMessage"
          (keyup.enter)="sendMessage()"
          [disabled]="isLoading"
          class="input-field"
        />
        <button
          (click)="sendMessage()"
          [disabled]="isLoading || !newMessage.trim()"
          class="btn-send"
        >
          <span *ngIf="!isLoading">✈️ Envoyer</span>
          <span *ngIf="isLoading">⏳...</span>
        </button>
      </div>
    </div>
  </div>
</div>
