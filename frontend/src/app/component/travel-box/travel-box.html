<section class="travel-box">
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <div class="single-travel-boxes">
          <div class="desc-tabs">
            <ul class="nav nav-tabs">
              <li class="nav-item">
                <a class="nav-link" [ngClass]="{'active': activeTab === 'tours'}" 
                   (click)="setActiveTab('tours')">
                  <i class="fa fa-tree"></i> tours
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" [ngClass]="{'active': activeTab === 'hotels'}" 
                   (click)="setActiveTab('hotels')">
                  <i class="fa fa-building"></i> hotels
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" [ngClass]="{'active': activeTab === 'flights'}" 
                   (click)="setActiveTab('flights')">
                  <i class="fa fa-plane"></i> flights
                </a>
              </li>
            </ul>

            <div class="tab-content mt-4">
              <!-- Onglet Tours -->
              <div class="tab-pane" [ngClass]="{'active show': activeTab === 'tours'}">
                <div class="row">
                  <div class="col-md-4">
                    <div class="form-group">
                      <label>Destination Country</label>
                      <select class="form-control" [(ngModel)]="searchData.tours.destinationCountry">
                        <option value="">Select country</option>
                        <option value="Argentina">Argentina</option>
                        <option value="Australia">Australia</option>
                        <option value="Brazil">Brazil</option>
                        <option value="Canada">Canada</option>
                        <option value="China">China</option>
                        <option value="Egypt">Egypt</option>
                        <option value="France">France</option>
                        <option value="Germany">Germany</option>
                        <option value="Greece">Greece</option>
                        <option value="India">India</option>
                        <option value="Italy">Italy</option>
                        <option value="Japan">Japan</option>
                        <option value="Kenya">Kenya</option>
                        <option value="Mexico">Mexico</option>
                        <option value="Morocco">Morocco</option>
                        <option value="New Zealand">New Zealand</option>
                        <option value="Peru">Peru</option>
                        <option value="South Africa">South Africa</option>
                        <option value="Spain">Spain</option>
                        <option value="Thailand">Thailand</option>
                        <option value="USA">USA</option>
                        <option value="Vietnam">Vietnam</option>
                      </select>
                    </div>
                  </div>
                  <div class="col-md-4">
                    <div class="form-group">
                      <label>Check-in Date</label>
                      <input type="date" class="form-control" [(ngModel)]="searchData.tours.checkIn">
                    </div>
                  </div>
                  <div class="col-md-4">
                    <div class="form-group">
                      <label>Duration (days)</label>
                      <select class="form-control" [(ngModel)]="searchData.tours.duration">
                        <option value="5">5</option>
                        <option value="10">10</option>
                        <option value="15">15</option>
                      </select>
                    </div>
                  </div>
                </div>
                <div class="row mt-3">
                  <div class="col-md-12 text-right">
                    <button class="btn btn-primary" (click)="search()">Search Tours</button>
                  </div>
                </div>
              </div>

              <!-- Onglets Hotels et Flights similaires -->
              <!-- ... -->

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
